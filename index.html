<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Generador de Números Aleatorios</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f2f2f2;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
    }

    .contenedor{
      background:white;
      padding:30px;
      border-radius:15px;
      box-shadow:0 0 10px rgba(0,0,0,0.2);
      width:350px;
      text-align:center;
    }

    h1{
      color:#333;
    }

    input{
      width:80%;
      padding:10px;
      margin:10px 0;
      border-radius:8px;
      border:1px solid #ccc;
      font-size:16px;
    }

    button{
      padding:10px 20px;
      border:none;
      border-radius:8px;
      background:#007bff;
      color:white;
      font-size:16px;
      cursor:pointer;
    }

    button:hover{
      background:#0056b3;
    }

    #resultado{
      margin-top:20px;
      max-height:250px;
      overflow-y:auto;
      text-align:left;
      background:#f9f9f9;
      padding:10px;
      border-radius:10px;
      border:1px solid #ddd;
    }

    .numero{
      padding:5px;
      margin:3px 0;
      background:#e7f1ff;
      border-radius:5px;
    }
  </style>
</head>
<body>

  <div class="contenedor">
    <h1>Números Aleatorios</h1>

    <p>¿Cuántos números deseas generar?</p>

    <input type="number" id="cantidad" placeholder="Ejemplo: 50">

    <br>

    <button onclick="generarNumeros()">
      Generar
    </button>

    <div id="resultado"></div>
  </div>

  <script>
    function generarNumeros() {

      let cantidad = document.getElementById("cantidad").value;
      let resultado = document.getElementById("resultado");

      resultado.innerHTML = "";

      if(cantidad <= 0){
        resultado.innerHTML = "Ingresa una cantidad válida.";
        return;
      }

      for(let i = 1; i <= cantidad; i++){

        // Número aleatorio entre 1 y 1000
        let numero = Math.floor(Math.random() * 1000) + 1;

        resultado.innerHTML += `
          <div class="numero">
            Número ${i}: ${numero}
          </div>
        `;
      }
    }
  </script>

</body>
</html>
